<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema OS v2</title>
  <meta name="description" content="Sistema de Gestão de Ordens de Serviço v2.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0b1120;
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      flex-direction: column;
      gap: 16px;
    }
    .brand {
      font-size: 28px;
      font-weight: 800;
      color: #3b82f6;
      letter-spacing: -1px;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 13px; color: #64748b; }
  </style>
</head>
<body>
  <div class="brand">Sistema OS</div>
  <div class="spinner"></div>
  <p>Verificando autenticação...</p>

  <script type="module">
    import { auth } from './js/firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js';
    import { database } from './js/firebase.js';
    import { ref, get } from 'https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js';

    // Restore theme before anything renders
    const savedTheme = localStorage.getItem('os-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
    document.body.style.background = savedTheme === 'light' ? '#f0f4f8' : '#0b1120';

    const unsubscribe = onAuthStateChanged(auth, async (user) => {
      unsubscribe();
      if (!user) {
        window.location.replace('login.html');
        return;
      }
      try {
        const snap = await get(ref(database, `usuarios/${user.uid}`));
        if (snap.exists() && snap.val().ativo !== false) {
          window.location.replace('dashboard.html');
        } else {
          window.location.replace('login.html');
        }
      } catch {
        window.location.replace('dashboard.html');
      }
    });

    // Fallback timeout
    setTimeout(() => window.location.replace('login.html'), 8000);
  </script>
</body>
</html>
